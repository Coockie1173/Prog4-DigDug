name: CMake

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - '.github/workflows/*'
      - 'editor/**'
      - 'ComponentPrecompiler/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        compiler: [msvc, gcc, clang]

        exclude:
          - os: ubuntu-latest
            compiler: msvc
          - os: windows-latest
            compiler: gcc

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # CACHE (Linux SDL deps + build cache)
      # -------------------------
      - name: Cache build dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: sdl-${{ runner.os }}-${{ matrix.compiler }}-${{ hashFiles('**/CMakeLists.txt') }}

      # -------------------------
      # LINUX DEPENDENCIES (complete minimal SDL + SDL_ttf fix)
      # -------------------------
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            build-essential \
            pkg-config \
            \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxkbcommon-dev \
            libxss-dev \
            libxtst-dev \
            libxrender-dev \
            libxcomposite-dev \
            libxdamage-dev \
            \
            libwayland-dev \
            wayland-protocols \
            libdecor-0-dev \
            \
            libasound2-dev \
            libpulse-dev \
            \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            \
            libudev-dev \
            libdbus-1-dev \
            \
            # SDL_ttf fix
            libfreetype6-dev \
            libharfbuzz-dev

      # -------------------------
      # CONFIGURE (LINUX)
      # -------------------------
      - name: Configure CMake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            CC=gcc CXX=g++ cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DBUILD_EDITOR=OFF
          fi

          if [ "${{ matrix.compiler }}" = "clang" ]; then
            CC=clang CXX=clang++ cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DBUILD_EDITOR=OFF
          fi

      # -------------------------
      # CONFIGURE (WINDOWS MSVC)
      # -------------------------
      - name: Configure CMake (Windows MSVC)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'msvc'
        run: |
          cmake -B build -G "Visual Studio 17 2022" `
            -DBUILD_EDITOR=OFF

      # -------------------------
      # CONFIGURE (WINDOWS clang-cl FIXED)
      # -------------------------
      - name: Configure CMake (Windows Clang)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang'
        run: >
          cmake -B build -G Ninja
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DBUILD_EDITOR=OFF

      # -------------------------
      # BUILD (LINUX)
      # -------------------------
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build build

      # -------------------------
      # BUILD (WINDOWS)
      # -------------------------
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake --build build --config ${{ matrix.build_type }} --target digdug