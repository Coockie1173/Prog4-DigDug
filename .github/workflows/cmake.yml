name: CMake

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - '.github/workflows/*'
      - 'editor/**'
      - 'ComponentPrecompiler/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        compiler: [msvc, gcc, clang]

        exclude:
          - os: ubuntu-latest
            compiler: msvc
          - os: windows-latest
            compiler: gcc

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # LINUX DEPENDENCIES
      # -------------------------
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            build-essential \
            clang \
            pkg-config \
            \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxkbcommon-dev \
            libxss-dev \
            libxtst-dev \
            libxrender-dev \
            libxcomposite-dev \
            libxdamage-dev \
            \
            libwayland-dev \
            wayland-protocols \
            libdecor-0-dev \
            \
            libasound2-dev \
            libpulse-dev \
            \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            \
            libudev-dev \
            libdbus-1-dev \
            \
            libfreetype6-dev \
            libharfbuzz-dev

      # -------------------------
      # CONFIGURE (LINUX GCC)
      # -------------------------
      - name: Configure CMake (Linux GCC)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'gcc'
        run: |
          CC=gcc CXX=g++ cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_EDITOR=OFF \
            -DSDLMIXER_OPUS=OFF

      # -------------------------
      # CONFIGURE (LINUX CLANG)
      # -------------------------
      - name: Configure CMake (Linux Clang)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang'
        run: |
          CC=clang CXX=clang++ cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_EDITOR=OFF \
            -DSDLMIXER_OPUS=OFF

      # -------------------------
      # CONFIGURE (WINDOWS MSVC)
      # -------------------------
      - name: Configure CMake (Windows MSVC)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'msvc'
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -DBUILD_EDITOR=OFF `
            -DSDLMIXER_OPUS=OFF

      # -------------------------
      # CONFIGURE (WINDOWS CLANG)
      # -------------------------
      - name: Configure CMake (Windows Clang)
        if: matrix.os == 'windows-latest' && matrix.compiler == 'clang'
        shell: pwsh
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_C_FLAGS="/arch:AVX2" `
            -DCMAKE_CXX_FLAGS="/arch:AVX2" `
            -DBUILD_EDITOR=OFF `
            -DSDLMIXER_OPUS=OFF

      # -------------------------
      # VERIFY CONFIGURE
      # -------------------------
      - name: Verify Configure
        run: |
          test -f build/CMakeCache.txt || exit 1
        shell: bash

      # -------------------------
      # BUILD (LINUX)
      # -------------------------
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake --build build --parallel

      # -------------------------
      # BUILD (WINDOWS)
      # -------------------------
      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake --build build --config ${{ matrix.build_type }} --parallel
        shell: pwsh